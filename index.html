<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DINFO - Equipo de Desarrollo</title>

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --card-soft: #f8fafc;
      --border: #d9e2ec;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #1d4ed8;
      --primary-soft: #dbeafe;
      --accent: #0f172a;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4fb 0%, #f7f9fc 100%);
      color: var(--text);
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      border-radius: 30px;
      padding: 34px 32px;
      margin-bottom: 22px;
      color: #ffffff;
    }

    .hero h1 { margin: 0 0 10px; }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .cards-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .mini-card {
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .meta { margin-bottom: 10px; }

    button {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 10px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .hidden { display: none; }

    /* NUEVO: estilos copiar */
    .email-copy {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #dbeafe;
    }

    .copy-btn svg {
      width: 16px;
      height: 16px;
    }

    .copy-ok {
      font-size: 12px;
      color: green;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="app">

  <section class="hero">
    <h1>DINFO - Equipo de Desarrollo</h1>
  </section>

  <section class="panel" id="viewCards">
    <div class="cards-grid" id="cardsGrid"></div>
  </section>

  <section class="panel hidden" id="viewDetail">
    <div id="profileCard"></div>
  </section>

</div>

<script>

let data = {
  jefesProyecto: [
    {
      id: "1",
      nombre: "Fabián Hernández",
      correo: "fabian@minvu.cl",
      cargo: "Jefe de Proyecto"
    }
  ]
};

function copyToClipboard(text, feedbackId) {
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById(feedbackId);
    if (el) {
      el.textContent = "Copiado";
      setTimeout(() => el.textContent = "", 1500);
    }
  });
}

function renderCards() {
  const grid = document.getElementById("cardsGrid");

  grid.innerHTML = data.jefesProyecto.map(item => `
    <div class="mini-card">
      <div class="avatar">${item.nombre[0]}</div>
      <h3>${item.nombre}</h3>

      <div class="meta">
        <div>
          <strong>Correo:</strong>
          <span class="email-copy">
            <span>${item.correo}</span>

            <button class="copy-btn"
              onclick="copyToClipboard('${item.correo}', 'fb-${item.id}')">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4"></path>
              </svg>

            </button>

            <span id="fb-${item.id}" class="copy-ok"></span>
          </span>
        </div>
      </div>

      <button class="btn-primary" onclick="renderDetail('${item.id}')">
        Ver detalle
      </button>

    </div>
  `).join("");
}

function renderDetail(id) {
  const person = data.jefesProyecto.find(p => p.id === id);

  document.getElementById("profileCard").innerHTML = `
    <h2>${person.nombre}</h2>

    <div>
      <strong>Correo:</strong>
      <span class="email-copy">
        <span>${person.correo}</span>

        <button class="copy-btn"
          onclick="copyToClipboard('${person.correo}', 'fb-detail')">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4"></path>
          </svg>

        </button>

        <span id="fb-detail" class="copy-ok"></span>
      </span>
    </div>
  `;

  document.getElementById("viewCards").classList.add("hidden");
  document.getElementById("viewDetail").classList.remove("hidden");
}

renderCards();

</script>

</body>
</html>
